---
deployment:
  tasks:
    # Deploy Laravel into a subfolder (matches index.php / .htaccess base path).
    # Update DEPLOYPATH if your site lives elsewhere on the server.
    - export DEPLOYPATH=$HOME/public_html/resume-builder
    - /bin/mkdir -p $DEPLOYPATH

    # Copy application files to the live directory (never modify the git checkout).
    - /usr/bin/rsync -a --delete --exclude=.git --exclude=node_modules --exclude=vendor --exclude=.env --exclude=storage/logs --exclude=storage/framework/cache --exclude=storage/framework/sessions --exclude=storage/framework/views ./ $DEPLOYPATH/

    # File permissions (403 on cPanel is often caused by overly strict modes).
    - /bin/find $DEPLOYPATH -type d -exec chmod 755 {} \;
    - /bin/find $DEPLOYPATH -type f -exec chmod 644 {} \;
    - /bin/chmod 755 $DEPLOYPATH/index.php

    # If domain root has no index, redirect / to /resume-builder/
    - |
      if [ ! -f "$HOME/public_html/index.php" ] && [ ! -f "$HOME/public_html/index.html" ]; then
        /bin/cp "$DEPLOYPATH/deploy/public_html-index.php" "$HOME/public_html/index.php"
        /bin/chmod 644 "$HOME/public_html/index.php"
      fi
    - cd $DEPLOYPATH && composer install --no-dev --optimize-autoloader --no-interaction

    # Build frontend assets when Node.js is available (optional on shared hosting).
    - cd $DEPLOYPATH && (npm ci --omit=dev && npm run build || echo "npm build skipped")

    # Laravel optimizations (migrate is optional; remove "|| true" to fail on migration errors).
    - cd $DEPLOYPATH && php artisan migrate --force --no-interaction || true
    - cd $DEPLOYPATH && php artisan config:cache
    - cd $DEPLOYPATH && php artisan route:cache
    - cd $DEPLOYPATH && php artisan view:cache

    # Writable directories for Laravel.
    - /bin/chmod -R ug+rwx $DEPLOYPATH/storage $DEPLOYPATH/bootstrap/cache
